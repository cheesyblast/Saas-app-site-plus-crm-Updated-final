# =========================================================
# Reverse-proxy Nginx for production deployment
# =========================================================
#
# Routes traffic to:
#   - https://<tenant>.example.com    -> frontend (SPA)
#   - https://<tenant>.example.com/api/* -> backend (FastAPI)
#   - https://admin.example.com       -> super-admin panel (frontend, same SPA, scoped via subdomain)
#
# Subdomain → tenant mapping happens INSIDE the backend (via X-Tenant-Slug header).
# Phase B will read $tenant_slug from the Host header and forward it as a request header.
#
# Currently configured for SINGLE-TENANT bootstrap. Multi-tenant blocks are commented
# below and become active when Phase B (multi-tenancy) ships.

# Tenant slug extraction: capture the leftmost label of the Host header.
# Example: "vetra.example.com" -> tenant_slug=vetra
# When the host is "example.com" (no subdomain) -> tenant_slug=""
map $host $tenant_slug {
    ~^(?<sub>[^.]+)\.(?<root>[^.]+\.[^.]+)$  $sub;
    default                                  "";
}

# Upstreams (resolved via Docker DNS — service name = hostname)
upstream backend_upstream {
    server backend:8001;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

# ---------- HTTP: ACME challenge + redirect to HTTPS ----------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenge served from the certbot webroot volume.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: catch-all for tenant subdomains + apex ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL certificate (Let's Encrypt via Certbot wildcard or per-domain).
    # NOTE: Replace ${DOMAIN} via envsubst in entrypoint or generate with certbot.
    # Default fallback to the snakeoil cert for local/dev.
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Generic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    # ===== Backend =====
    # /api/* is forwarded to the FastAPI backend.
    # Tenant slug is propagated as X-Tenant-Slug for Phase B multi-tenancy.
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Tenant-Slug     $tenant_slug;
        proxy_set_header   Connection        "";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ===== Frontend SPA =====
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Tenant-Slug     $tenant_slug;
        proxy_set_header   Connection        "";
    }
}
