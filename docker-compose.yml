# =========================================================
# Production / staging stack
# =========================================================
#
# Self-hosted Supabase Postgres lives EXTERNALLY (your VPS or a separate
# docker-compose file you control). This compose file connects to it via
# DATABASE_URL in backend/.env.production — do NOT bundle Postgres here
# unless you're spinning up a single-machine all-in-one stack.
#
# Run: docker compose -f docker-compose.yml --env-file .env.production up -d
# First-time SSL: see deploy/init-letsencrypt.sh

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: erp-backend:latest
    container_name: erp-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    expose:
      - "8001"
    networks:
      - erp_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/company"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # CRA inlines REACT_APP_BACKEND_URL at BUILD time, so it must be passed here.
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    image: erp-frontend:latest
    container_name: erp-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - erp_net
    depends_on:
      - backend

  reverse-proxy:
    image: nginx:alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    networks:
      - erp_net
    depends_on:
      - backend
      - frontend
    # Reload nginx every 6h so renewed certs are picked up.
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: erp-certbot
    restart: unless-stopped
    volumes:
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    # Try renewal every 12h (cert lasts 90d, refreshes when within 30d of expiry).
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  erp_net:
    driver: bridge
