# Frontend Nginx — serves the CRA build with SPA fallback and long-cache static assets.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable directory listing
    autoindex off;

    # Health endpoint (used by Docker healthcheck and the upstream reverse proxy)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Long-cache hashed assets (CRA names them with content hashes)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hashed JS/CSS at the root (just in case)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — every other route returns index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml font/ttf font/otf font/woff font/woff2;
}
